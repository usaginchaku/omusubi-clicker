// 日本式の数値フォーマット(万・億・兆・京)
function fmt(n) {
  const neg = n < 0;
  n = Math.abs(n);
  let out;
  if (n < 1e4) out = Math.floor(n).toLocaleString("ja-JP");
  else {
    const units = [[1e16, "京"], [1e12, "兆"], [1e8, "億"], [1e4, "万"]];
    out = Math.floor(n).toLocaleString("ja-JP");
    for (const [v, u] of units) {
      if (n >= v) {
        const x = n / v;
        out = (x >= 100 ? Math.floor(x) : x.toFixed(x >= 10 ? 1 : 2)) + u;
        break;
      }
    }
  }
  return (neg ? "-" : "") + out;
}

// 生産量:小数点第1位まで
function fmtCps(n) {
  if (n >= 1e4) return fmt(n);
  return n.toLocaleString("ja-JP", { minimumFractionDigits: 1, maximumFractionDigits: 1 });
}

// 相場の増減表示
function marketPct(f) {
  const pct = Math.round((f - 1) * 100);
  if (pct === 0) return <span style={{ color: "#9fb3cc" }}>±0%</span>;
  return pct > 0 ? (
    <span style={{ color: "#ff8a7a" }}>▲{pct}%</span>
  ) : (
    <span style={{ color: "#7ec97e" }}>▼{Math.abs(pct)}%</span>
  );
}

// ---------- 価格計算 ----------
const fillingBuyPrice = (f, market) => Math.ceil(f.buyBase * (market[f.id] || 1));
const sellPrice = (f, brand, market, trending) =>
  Math.ceil(
    (RICE_PER_ONIGIRI + f.valBase * (market[f.id] || 1) * (trending === f.id ? 2.5 : 1)) *
      brand.mult
  );
const ricePrice = (riceMkt, farmers) =>
  Math.ceil(RICE_PER_ONIGIRI * riceMkt * farmerDiscount(farmers));
const brandPremium = (b, brandMkt) => Math.ceil(b.premium * (brandMkt[b.id] || 1));
const craftCost = (f, b, market, riceMkt, brandMkt, farmers) =>
  ricePrice(riceMkt, farmers) + brandPremium(b, brandMkt) + fillingBuyPrice(f, market);

// ---------- セーブコード ----------
const SAVE_PREFIX = "OMSB1|";
function encodeSave(obj) {
  return SAVE_PREFIX + btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
}
function decodeSave(code) {
  if (!code.startsWith(SAVE_PREFIX)) throw new Error("bad prefix");
  return JSON.parse(decodeURIComponent(escape(atob(code.slice(SAVE_PREFIX.length)))));
}

        [[70, 50], [130, 55], [55, 100], [150, 95], [100, 40]].map(([x, y], i) => (
          <text key={i} x={x} y={y} fontSize="13" opacity="0.9">✦</text>
        ))}
      {skin.nori && (
        <>
          <path
            d="M66 122 L 134 122 C 136 122 138 124 138 126 L 138 158
               C 126 165 112 168 100 168 C 88 168 74 165 62 158
               L 62 126 C 62 124 64 122 66 122 Z"
            fill={skin.nori} stroke="#22352a" strokeWidth="2"
          />
          <ellipse cx="78" cy="136" rx="9" ry="4" fill="#ffffff" opacity="0.12" transform="rotate(-10 78 136)" />
        </>
      )}
      <circle cx="80" cy="90" r="6.5" fill="#3b3530" />
      <circle cx="120" cy="90" r="6.5" fill="#3b3530" />
      <circle cx="82.5" cy="87.5" r="2.4" fill="#ffffff" />
      <circle cx="122.5" cy="87.5" r="2.4" fill="#ffffff" />
      <path d="M92 100 Q100 109 108 100" stroke="#3b3530" strokeWidth="3.5" fill="none" strokeLinecap="round" />
      <ellipse cx="64" cy="101" rx="8" ry="5" fill="#f8b9aa" opacity="0.75" />
      <ellipse cx="136" cy="101" rx="8" ry="5" fill="#f8b9aa" opacity="0.75" />
    </svg>
  );
}

// ---------- メイン ----------
function OnigiriClicker() {
  const [rice, setRice] = useState(0);
  const [totalRice, setTotalRice] = useState(0);
  const [clicks, setClicks] = useState(0);
  const [owned, setOwned] = useState({});
  const [upgrades, setUpgrades] = useState({});
  const [goldenClicks, setGoldenClicks] = useState(0);
  const [unlocked, setUnlocked] = useState({});
  const [particles, setParticles] = useState([]);
  const [grains, setGrains] = useState([]);
  const [squish, setSquish] = useState(false);
  const [golden, setGolden] = useState(null);
  const [frenzy, setFrenzy] = useState(0);
  const [toasts, setToasts] = useState([]);
  const [tab, setTab] = useState("shop");

  // 工房
  const [market, setMarket] = useState(() => Object.fromEntries(FILLINGS.map((f) => [f.id, 1])));
  const [riceMkt, setRiceMkt] = useState(1);
  const [brandMkt, setBrandMkt] = useState(() => Object.fromEntries(BRANDS.map((b) => [b.id, 1])));
  const [trending, setTrending] = useState(null);
  const [selFilling, setSelFilling] = useState(FILLINGS[0].id);
  const [selBrand, setSelBrand] = useState(BRANDS[0].id);
  const [inventory, setInventory] = useState([]);
  const [crafted, setCrafted] = useState(0);
  const [sold, setSold] = useState(0);
  const [profit, setProfit] = useState(0);
  const [farmers, setFarmers] = useState(0);

  // スキン・かくし
  const [skinsOwned, setSkinsOwned] = useState({ plain: true });
  const [activeSkin, setActiveSkin] = useState("plain");
  const [secret, setSecret] = useState(false);
  const titleClicks = useRef(0);

  // セーブ
  const [saveText, setSaveText] = useState("");

  const pid = useRef(0);
  const skin = SKINS.find((s) => s.id === activeSkin) || SKINS[0];
  const skinRef = useRef(activeSkin);
  skinRef.current = activeSkin;

  // スキン能力
  const skinClickMult = activeSkin === "yukari" ? 1.15 : activeSkin === "gold" ? 1.15 : 1;
  const skinCpsMult = activeSkin === "genmai" ? 1.1 : activeSkin === "gold" ? 1.15 : 1;
  const skinBuildingMult = activeSkin === "yaki" ? 0.95 : 1;

  const clickPower =
    UPGRADES.reduce((p, u) => p * (upgrades[u.id] ? u.mult : 1), 1) *
    skinClickMult *
    (frenzy > 0 ? 7 : 1);

  const baseCps =
    BUILDINGS.reduce((s, b) => s + b.cps * (owned[b.id] || 0), 0) * skinCpsMult;
  const cps = baseCps * (frenzy > 0 ? 7 : 1);
  const cpsRef = useRef(cps);
  cpsRef.current = cps;

  const buildingCost = (b, n) => Math.ceil(b.baseCost * Math.pow(1.15, n) * skinBuildingMult);

  // 自動生産ティック
  useEffect(() => {
    const t = setInterval(() => {
      const gain = cpsRef.current / 10;
      if (gain > 0) {
        setRice((r) => r + gain);
        setTotalRice((r) => r + gain);
      }
    }, 100);
    return () => clearInterval(t);
  }, []);

  // フィーバー
  useEffect(() => {
    if (frenzy <= 0) return;
    const t = setInterval(() => setFrenzy((f) => Math.max(0, f - 1)), 1000);
    return () => clearInterval(t);
  }, [frenzy > 0]);

  // 金のおむすび出現(赤飯スキンで間隔短縮)
  useEffect(() => {
    let timer;
    const schedule = () => {
      const speedup = skinRef.current === "sekihan" ? 0.75 : 1;
      timer = setTimeout(() => {
        setGolden({ x: 10 + Math.random() * 75, y: 12 + Math.random() * 65 });
        setTimeout(() => setGolden(null), 8000);
        schedule();
      }, (25000 + Math.random() * 25000) * speedup);
    };
    schedule();
    return () => clearTimeout(timer);
  }, []);

  // 相場の変動(15秒ごと):具材・米・ブランド米すべて株価のように動く
  useEffect(() => {
    const t = setInterval(() => {
      setMarket((m) => {
        const next = { ...m };
        for (const f of FILLINGS) {
          const drift = (Math.random() - 0.5) * 0.3;
          next[f.id] = Math.min(1.5, Math.max(0.6, (next[f.id] || 1) + drift));
        }
        return next;
      });
      setRiceMkt((r) => Math.min(1.3, Math.max(0.75, r + (Math.random() - 0.5) * 0.18)));
      setBrandMkt((m) => {
        const next = { ...m };
        for (const b of BRANDS) {
          next[b.id] = Math.min(1.4, Math.max(0.7, (next[b.id] || 1) + (Math.random() - 0.5) * 0.22));
        }
        return next;
      });
      if (Math.random() < 0.5) {
        const f = FILLINGS[Math.floor(Math.random() * FILLINGS.length)];
        setTrending(f.id);
      }
    }, 15000);
    return () => clearInterval(t);
  }, []);

  const pushToast = useCallback((msg) => {
    const id = pid.current++;
    setToasts((t) => [...t, { id, msg }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 3200);
  }, []);

  // 実績チェック
  useEffect(() => {
    const state = { clicks, totalRice, owned, upgrades, goldenClicks, crafted, sold, profit, skinsOwned, farmers, secret };
    for (const a of ACHIEVEMENTS) {
      if (!unlocked[a.id] && a.cond(state)) {
        setUnlocked((u) => ({ ...u, [a.id]: true }));
        pushToast(`🏆 実績解除:${a.name}`);
      }
    }
  }, [clicks, totalRice, owned, upgrades, goldenClicks, crafted, sold, profit, skinsOwned, farmers, secret, unlocked, pushToast]);

  // タイトルの🍙クリック(かくし実績)
  const pokeTitle = () => {
    titleClicks.current += 1;
    if (titleClicks.current === 7 && !secret) {
      setSecret(true);
      pushToast("🤫 ……なにか見つけたようだ");
    }
  };

  const handleClick = useCallback(
    (e) => {
      setRice((r) => r + clickPower);
      setTotalRice((r) => r + clickPower);
      setClicks((c) => c + 1);
      setSquish(true);
      setTimeout(() => setSquish(false), 100);

      const rect = e.currentTarget.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;

      const tId = pid.current++;
      setParticles((p) => [
        ...p,
        { id: tId, x: cx + (Math.random() * 40 - 20), y: cy - 10, text: `+${fmt(clickPower)}` },
      ]);
      setTimeout(() => setParticles((p) => p.filter((q) => q.id !== tId)), 800);

      const newGrains = [];
      const count = 3 + Math.floor(Math.random() * 3);
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 22 + Math.random() * 38;
        newGrains.push({
          id: pid.current++,
          x: cx, y: cy,
          dx: Math.cos(angle) * dist,
          dy: Math.abs(Math.sin(angle)) * dist * 0.5 + 14,
          rot: Math.random() * 180 - 90,
          dur: 0.9 + Math.random() * 0.4,
        });
      }
      setGrains((g) => [...g, ...newGrains]);
      setTimeout(() => setGrains((g) => g.filter((q) => !newGrains.some((n) => n.id === q.id))), 1500);
    },
    [clickPower]
  );

  const clickGolden = () => {
    setGolden(null);
    setGoldenClicks((c) => c + 1);
    if (Math.random() < 0.5) {
      const bonus = Math.max(cpsRef.current * 60, clickPower * 100);
      setRice((r) => r + bonus);
      setTotalRice((r) => r + bonus);
      pushToast(`🍙✨ 豊作だ! +${fmt(bonus)} 米粒`);
    } else {
      setFrenzy(15);
      pushToast("🔥 フィーバー! 15秒間 生産 ×7!");
    }
  };

  const buy = (b) => {
    const cost = buildingCost(b, owned[b.id] || 0);
    if (rice < cost) return;
    setRice((r) => r - cost);
    setOwned((o) => ({ ...o, [b.id]: (o[b.id] || 0) + 1 }));
  };

  const buyUpgrade = (u) => {
    if (rice < u.cost || upgrades[u.id]) return;
    setRice((r) => r - u.cost);
    setUpgrades((o) => ({ ...o, [u.id]: true }));
    pushToast(`${u.icon} ${u.name} を入手! クリック力${u.mult}倍!`);
  };

  // ---------- 工房 ----------
  const craft = (n) => {
    const f = FILLINGS.find((x) => x.id === selFilling);
    const b = BRANDS.find((x) => x.id === selBrand);
    const unit = craftCost(f, b, market, riceMkt, brandMkt, farmers);
    const cost = unit * n;
    if (rice < cost) return;
    setRice((r) => r - cost);
    setCrafted((c) => c + n);
    setProfit((p) => p - cost);
    setInventory((inv) => {
      const i = inv.findIndex((x) => x.fid === f.id && x.bid === b.id);
      if (i >= 0) {
        const next = [...inv];
        next[i] = { ...next[i], count: next[i].count + n };
        return next;
      }
      return [...inv, { fid: f.id, bid: b.id, count: n }];
    });
  };

  const sell = (item) => {
    const f = FILLINGS.find((x) => x.id === item.fid);
    const b = BRANDS.find((x) => x.id === item.bid);
    const price = sellPrice(f, b, market, trending) * item.count;
    setRice((r) => r + price);
    setTotalRice((r) => r + price);
    setSold((s) => s + item.count);
    setProfit((p) => p + price);
    setInventory((inv) => inv.filter((x) => !(x.fid === item.fid && x.bid === item.bid)));
    pushToast(`💰 ${f.name}おむすび×${item.count} を ${fmt(price)} 粒で売却!`);
  };

  const hireFarmer = () => {
    const cost = farmerCost(farmers);
    if (rice < cost) return;
    setRice((r) => r - cost);
    setFarmers((n) => n + 1);
    pushToast(`👨‍🌾 契約農家が増えた! 米の仕入れ -${Math.min(50, (farmers + 1) * 3)}%`);
  };

  const buySkin = (s) => {
    if (skinsOwned[s.id]) {
      setActiveSkin(s.id);
      return;
    }
    if (rice < s.cost) return;
    setRice((r) => r - s.cost);
    setSkinsOwned((o) => ({ ...o, [s.id]: true }));
    setActiveSkin(s.id);
    pushToast(`👘 ${s.name} に着せ替え! (${s.ability})`);
  };

  // ---------- セーブ ----------
  const exportSave = () => {
    const code = encodeSave({
      v: 1, rice, totalRice, clicks, owned, upgrades, goldenClicks, unlocked,
      inventory, crafted, sold, profit, farmers, skinsOwned, activeSkin, secret,
    });
    setSaveText(code);
    pushToast("📋 セーブコードを書き出した! コピーしてね");
  };

  const importSave = () => {
    try {
      const d = decodeSave(saveText.trim());
      if (d.v !== 1) throw new Error("version");
      setRice(d.rice || 0); setTotalRice(d.totalRice || 0); setClicks(d.clicks || 0);
      setOwned(d.owned || {}); setUpgrades(d.upgrades || {});
      setGoldenClicks(d.goldenClicks || 0); setUnlocked(d.unlocked || {});
      setInventory(d.inventory || []); setCrafted(d.crafted || 0);
      setSold(d.sold || 0); setProfit(d.profit || 0); setFarmers(d.farmers || 0);
      setSkinsOwned(d.skinsOwned || { plain: true });
      setActiveSkin(d.activeSkin || "plain");
      setSecret(!!d.secret);
      pushToast("✅ セーブデータを読み込んだ! おかえり!");
    } catch {
      pushToast("❌ コードが読み込めなかった…形式を確認してね");
    }
  };

  const visibleUpgrades = UPGRADES.filter((u) => !upgrades[u.id] && totalRice >= u.cost * 0.4);
  const achCount = Object.values(unlocked).filter(Boolean).length;
  const koubouUnlocked = totalRice >= RICE_PER_ONIGIRI;
  const curF = FILLINGS.find((x) => x.id === selFilling);
  const curB = BRANDS.find((x) => x.id === selBrand);
  const curCost = craftCost(curF, curB, market, riceMkt, brandMkt, farmers);
  const curSell = sellPrice(curF, curB, market, trending);

  const TABS = [
    { id: "shop", label: "ショップ" },
    ...(koubouUnlocked ? [{ id: "koubou", label: "工房" }] : []),
    { id: "shisetsu", label: "施設" },
    { id: "skin", label: "きせかえ" },
    { id: "jisseki", label: "実績" },
    { id: "save", label: "セーブ" },
  ];

  return (
    <div className="root">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@400;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .root {
          min-height: 100vh;
          background: linear-gradient(180deg, #1a2433 0%, #232f42 60%, #2b3a52 100%);
          color: #f5f1e8;
          font-family: 'Zen Maru Gothic', sans-serif;
          display: flex; flex-direction: column;
        }
        .header { text-align: center; padding: 18px 12px 6px; }
        .title {
          font-family: 'DotGothic16', monospace;
          font-size: clamp(24px, 6vw, 40px);
          letter-spacing: 2px; color: #ffd97a;
          text-shadow: 3px 3px 0 #00000055;
          user-select: none;
        }
        .title-emoji { cursor: pointer; display: inline-block; transition: transform 0.1s; }
        .title-emoji:active { transform: scale(0.8) rotate(-10deg); }
        .stats { text-align: center; padding: 6px 12px 12px; }
        .rice-count {
          font-family: 'DotGothic16', monospace;
          font-size: clamp(28px, 7vw, 44px); color: #fff;
        }
        .cps { color: #9fb3cc; font-size: 14px; margin-top: 2px; }
        .skin-ability { color: #ffd97a; font-size: 12px; margin-top: 2px; }
        .frenzy-banner {
          background: #e94f37; color: #fff;
          font-family: 'DotGothic16', monospace;
          text-align: center; padding: 6px; font-size: 15px;
          animation: blink 0.6s infinite alternate;
        }
        @keyframes blink { from { opacity: 1 } to { opacity: 0.7 } }
        .main {
          display: flex; flex-direction: column; flex: 1;
          max-width: 980px; width: 100%; margin: 0 auto;
        }
        @media (min-width: 760px) {
          .main { flex-direction: row; gap: 16px; padding: 0 16px; }
          .left { flex: 1; position: sticky; top: 0; align-self: flex-start; }
          .right { width: 400px; }
        }
        .left {
          position: relative; display: flex;
          align-items: center; justify-content: center;
          padding: 12px 0 24px; min-height: 300px;
          overflow: hidden;
        }
        .onigiri-btn {
          background: none; border: none; cursor: pointer;
          transition: transform 0.08s ease;
          -webkit-tap-highlight-color: transparent;
          filter: drop-shadow(0 12px 24px rgba(0,0,0,0.45));
        }
        .onigiri-btn:active, .onigiri-btn.squish { transform: scale(0.9); }
        .onigiri-btn:focus-visible { outline: 3px dashed #ffd97a; outline-offset: 8px; border-radius: 50%; }
        .particle {
          position: absolute;
          font-family: 'DotGothic16', monospace;
          font-size: 20px; color: #ffd97a;
          pointer-events: none;
          animation: floatUp 0.8s ease-out forwards;

        .skin-price { font-family: 'DotGothic16', monospace; font-size: 12px; color: #ffd97a; margin-top: 2px; }
        .ach-item {
          display: flex; align-items: center; gap: 10px;
          background: #2e3d54; border-radius: 10px;
          padding: 8px 12px; border: 2px solid #44587a; margin-bottom: 6px;
        }
        .ach-item.locked { opacity: 0.55; }
        .ach-item.done { border-color: #ffd97a; }
        .ach-name { font-weight: 700; font-size: 13px; }
        .ach-desc { font-size: 11px; color: #9fb3cc; }
        .save-area {
          width: 100%; min-height: 110px;
          background: #1d2736; color: #cfe0f5;
          border: 2px solid #44587a; border-radius: 12px;
          font-family: monospace; font-size: 11px;
          padding: 10px; resize: vertical;
        }
        .golden {
          position: fixed; font-size: 52px; cursor: pointer;
          background: none; border: none; z-index: 50;
          animation: goldPulse 0.8s infinite alternate;
          filter: drop-shadow(0 0 14px #ffd97a);
        }
        @keyframes goldPulse { from { transform: scale(1) rotate(-6deg); } to { transform: scale(1.15) rotate(6deg); } }
        .toast-area {
          position: fixed; top: 14px; left: 50%;
          transform: translateX(-50%);
          display: flex; flex-direction: column; gap: 6px;
          z-index: 60; align-items: center;
        }
        .toast {
          background: #ffd97a; color: #1a2433;
          font-weight: 700; padding: 9px 18px;
          border-radius: 999px;
          box-shadow: 0 6px 18px rgba(0,0,0,0.4);
          font-size: 13px; white-space: nowrap;
          animation: toastIn 0.25s ease-out;
        }
        @keyframes toastIn {
          from { opacity: 0; transform: translateY(-12px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .footer-stats {
          text-align: center; font-size: 12px;
          color: #6f86a8; padding: 8px 0 18px;
        }
        @media (prefers-reduced-motion: reduce) {
          .particle, .golden, .frenzy-banner, .toast { animation: none; }
          .grain { display: none; }
        }
      `}</style>

      {frenzy > 0 && (
        <div className="frenzy-banner">🔥 フィーバー中! ×7 (残り{frenzy}秒) 🔥</div>
      )}

      <header className="header">
        <h1 className="title">
          <span
            className="title-emoji"
            onClick={pokeTitle}
            role="button"
            aria-label="ひみつ"
          >
            🍙
          </span>{" "}
          おむすびくりっかー
        </h1>
      </header>

      <div className="stats">
        <div className="rice-count">{fmt(rice)} 米粒</div>
        <div className="cps">毎秒 {fmtCps(cps)} 粒 ・ クリック力 {fmt(clickPower)}</div>
        {skin.id !== "plain" && (
          <div className="skin-ability">👘 {skin.name}:{skin.ability}</div>
        )}
      </div>

      <div className="main">
        <div className="left">
          {particles.map((p) => (
            <span key={p.id} className="particle" style={{ left: p.x, top: p.y }}>{p.text}</span>
          ))}
          {grains.map((g) => (
            <span key={g.id} className="grain"
              style={{ left: g.x, top: g.y, "--dx": `${g.dx}px`, "--dy": `${g.dy}px`, "--rot": `${g.rot}deg`, "--dur": `${g.dur}s` }} />
          ))}
          <button
            className={`onigiri-btn ${squish ? "squish" : ""}`}
            onClick={handleClick}
            aria-label="おむすびを握る"
          >
            <OnigiriSVG skin={skin} />
          </button>
        </div>

        <div className="right">
          <div className="tabbar">
            {TABS.map((t) => (
              <button key={t.id} className={`tabbtn ${tab === t.id ? "active" : ""}`} onClick={() => setTab(t.id)}>
                {t.label}
              </button>
            ))}
          </div>

          {/* ---------- ショップ ---------- */}
          {tab === "shop" && (
            <>
              {visibleUpgrades.length > 0 && (
                <>
                  <div className="section-label">▼ グレードアップ</div>
                  {visibleUpgrades.map((u) => (
                    <button key={u.id} className={`shop-item ${u.id === "bodakko" ? "premium" : ""}`}
                      disabled={rice < u.cost} onClick={() => buyUpgrade(u)}>
                      <span className="shop-icon">{u.icon}</span>
                      <span className="shop-body">
                        <div className="shop-name">{u.name}</div>
                        <div className="shop-desc">{u.desc}</div>
                      </span>
                      <span className="shop-cost">{fmt(u.cost)} 粒</span>
                    </button>
                  ))}
                </>
              )}
              <div className="section-label">▼ 生産施設{skinBuildingMult < 1 ? "(焼きおむすび割引中)" : ""}</div>
              {BUILDINGS.map((b, i) => {
                const n = owned[b.id] || 0;
                const cost = buildingCost(b, n);
                const unlockedB = totalRice >= b.baseCost * 0.3 || n > 0 || i === 0;
                if (!unlockedB) return null;
                return (
                  <button key={b.id} className="shop-item" disabled={rice < cost} onClick={() => buy(b)}>
                    <span className="shop-icon">{b.icon}</span>
                    <span className="shop-body">
                      <div className="shop-name">{b.name}</div>
                      <div className="shop-desc">{b.desc} ・ 毎秒 {fmtCps(b.cps)} 粒</div>
                    </span>
                    <span className="shop-cost">{fmt(cost)} 粒</span>
                    <span className="shop-owned">{n > 0 ? n : ""}</span>
                  </button>
                );
              })}
            </>
          )}

          {/* ---------- 工房 ---------- */}
          {tab === "koubou" && (
            <>
              <div className="section-label">▼ 米相場</div>
              <div className="price-info">
                🌾 白米の仕入れ:<b>{fmt(ricePrice(riceMkt, farmers))} 粒/個</b>(相場 {marketPct(riceMkt)}
                {farmers > 0 && <>、農家割引 -{Math.min(50, farmers * 3)}%</>})
              </div>
              <button className="shop-item" disabled={rice < farmerCost(farmers)} onClick={hireFarmer} style={{ marginTop: 8 }}>
                <span className="shop-icon">👨‍🌾</span>
                <span className="shop-body">
                  <div className="shop-name">契約農家と契約する</div>
                  <div className="shop-desc">米の仕入れ価格 -3%/軒(最大-50%)</div>
                </span>
                <span className="shop-cost">{fmt(farmerCost(farmers))} 粒</span>
                <span className="shop-owned">{farmers > 0 ? farmers : ""}</span>
              </button>

              <div className="section-label">▼ ブレンド米を選ぶ(相場変動中)</div>
              {BRANDS.map((b) => (
                <button key={b.id} className={`shop-item ${selBrand === b.id ? "selected" : ""}`} onClick={() => setSelBrand(b.id)}>
                  <span className="shop-icon">🌾</span>
                  <span className="shop-body">
                    <div className="shop-name">{b.name}</div>
                    <div className="shop-desc">
                      売値 ×{b.mult.toFixed(1)}
                      {b.premium > 0 && <> ・ 相場 {marketPct(brandMkt[b.id] || 1)}</>}
                    </div>
                  </span>
                  <span className="shop-cost">+{fmt(brandPremium(b, brandMkt))} 粒/個</span>
                </button>
              ))}

              <div className="section-label">▼ 具材を選ぶ(相場変動中)</div>
              {FILLINGS.map((f) => (
                <button key={f.id} className={`shop-item ${selFilling === f.id ? "selected" : ""}`} onClick={() => setSelFilling(f.id)}>
                  <span className="shop-icon">{f.icon}</span>
                  <span className="shop-body">
                    <div className="shop-name">
                      {f.name}
                      {trending === f.id && <span className="trend-badge">📈 流行中!</span>}
                    </div>
                    <div className="shop-desc">
                      仕入れ {fmt(fillingBuyPrice(f, market))} 粒 ・ 相場 {marketPct(market[f.id] || 1)}
                    </div>
                  </span>
                  <span className="shop-cost">売値 {fmt(sellPrice(f, curB, market, trending))}</span>
                </button>
              ))}

              <div className="price-info">
                🍙 <b>{curB.name} × {curF.name}</b>
                <br />
                原価:米 {fmt(ricePrice(riceMkt, farmers))} + 米代 {fmt(brandPremium(curB, brandMkt))} + 具 {fmt(fillingBuyPrice(curF, market))} = <b>{fmt(curCost)} 粒</b>
                <br />
                現在の売値:<b>{fmt(curSell)} 粒</b>(利益 {fmt(curSell - curCost)} 粒/個)
                <br />
                <span style={{ fontSize: 11, color: "#9fb3cc" }}>
                  ※相場は15秒ごとに変動。安く仕入れて、流行ったら売る。なお支払いも米粒。
                </span>
              </div>

              <div className="craft-row">
                <button className="craft-btn" disabled={rice < curCost} onClick={() => craft(1)}>握る ×1</button>
                <button className="craft-btn" disabled={rice < curCost * 10} onClick={() => craft(10)}>握る ×10</button>
                <button className="craft-btn" disabled={rice < curCost * 100} onClick={() => craft(100)}>握る ×100</button>
              </div>

              <div className="section-label">▼ 在庫(タイミングを見て売れ!)</div>
              {inventory.length === 0 && (
                <div className="shop-desc" style={{ padding: "4px 2px" }}>
                  まだ在庫がないよ。握って、流行を待って、高く売ろう。
                </div>
              )}
              {inventory.map((item) => {
                const f = FILLINGS.find((x) => x.id === item.fid);
                const b = BRANDS.find((x) => x.id === item.bid);
                const p = sellPrice(f, b, market, trending);
                return (
                  <div key={item.fid + item.bid} className="shop-item" style={{ cursor: "default" }}>
                    <span className="shop-icon">{f.icon}</span>
                    <span className="shop-body">
                      <div className="shop-name">
                        {f.name}({b.name})×{item.count}
                        {trending === f.id && <span className="trend-badge">📈</span>}
                      </div>
                      <div className="shop-desc">今売ると {fmt(p)} 粒/個</div>
                    </span>
                    <button className="sell-btn" onClick={() => sell(item)}>
                      全部売る {fmt(p * item.count)}
                    </button>
                  </div>
                );
              })}
              <div className="price-info">
                累計販売 <b>{sold.toLocaleString("ja-JP")}</b> 個 ・ 累計利益 <b>{fmt(profit)}</b> 粒
              </div>
            </>
          )}

          {/* ---------- 施設一覧 ---------- */}
          {tab === "shisetsu" && (
            <>
              <div className="section-label">▼ あなたのおむすび帝国</div>
              {BUILDINGS.filter((b) => (owned[b.id] || 0) > 0).length === 0 && (
                <div className="shop-desc">まだ施設がないよ。ショップで買おう!</div>
              )}
              {BUILDINGS.map((b) => {
                const n = owned[b.id] || 0;
                if (n === 0) return null;
                return (
                  <div key={b.id} className="building-row">
                    <div className="building-head">
                      <span>{b.name}</span>
                      <span className="building-count">×{n} ・ 毎秒 {fmtCps(b.cps * n * skinCpsMult)} 粒</span>
                    </div>
                    <div className="building-icons">
                      {b.icon.repeat(Math.min(n, 40))}
                      {n > 40 && ` …+${n - 40}`}
                    </div>
                  </div>
                );
              })}
            </>
          )}

          {/* ---------- きせかえ ---------- */}
          {tab === "skin" && (
            <>
              <div className="section-label">▼ おむすびスキン(能力つき)</div>
              <div className="skin-grid">
                {SKINS.map((s) => {
                  const ownedSkin = !!skinsOwned[s.id];
                  return (
                    <button key={s.id} className={`skin-card ${activeSkin === s.id ? "active" : ""}`}
                      disabled={!ownedSkin && rice < s.cost} onClick={() => buySkin(s)}>
                      <div className="skin-swatch"
                        style={{ background: `linear-gradient(160deg, ${s.riceA}, ${s.riceB})` }} />
                      <div className="skin-name">{s.name}</div>
                      <div className="skin-ab">{s.ability}</div>
                      <div className="skin-price">
                        {activeSkin === s.id ? "装着中" : ownedSkin ? "きせかえる" : `${fmt(s.cost)} 粒`}
                      </div>
                    </button>
                  );
                })}
              </div>
              <div className="price-info" style={{ marginTop: 10 }}>
                💡 能力は<b>装着中のスキンのみ</b>発動するよ。状況で着替えよう。
              </div>
            </>
          )}

          {/* ---------- 実績 ---------- */}
          {tab === "jisseki" && (
            <>
              <div className="section-label">▼ 実績 ({achCount}/{ACHIEVEMENTS.length})</div>
              {ACHIEVEMENTS.map((a) => {
                const done = !!unlocked[a.id];
                return (
                  <div key={a.id} className={`ach-item ${done ? "done" : "locked"}`}>
                    <AchIcon id={a.id} done={done} />
                    <span>
                      <div className="ach-name">{done ? a.name : "???"}</div>
                      <div className="ach-desc">{a.secret && !done ? "?????" : a.desc}</div>
                    </span>
                  </div>
                );
              })}
            </>
          )}

          {/* ---------- セーブ ---------- */}
          {tab === "save" && (
            <>
              <div className="section-label">▼ セーブ&ロード</div>
              <div className="price-info" style={{ marginBottom: 10 }}>
                「書き出す」でセーブコードを生成 → コピーしてメモなどに保存。
                <br />
                続きから遊ぶときは、コードを貼り付けて「読み込む」!
              </div>
              <textarea
                className="save-area"
                value={saveText}
                onChange={(e) => setSaveText(e.target.value)}
                placeholder="ここにセーブコードが出ます / 貼り付けます"
              />
              <div className="craft-row">
                <button className="craft-btn" onClick={exportSave}>📤 書き出す</button>
                <button className="craft-btn" onClick={importSave} disabled={!saveText.trim()}>📥 読み込む</button>
              </div>
            </>
          )}
        </div>
      </div>

      <div className="footer-stats">
        累計 {fmt(totalRice)} 粒 ・ {clicks.toLocaleString("ja-JP")} 回握った ・ 販売 {sold.toLocaleString("ja-JP")} 個 ・ 実績 {achCount}/{ACHIEVEMENTS.length}
      </div>

      {golden && (
        <button className="golden" style={{ left: `${golden.x}%`, top: `${golden.y}%` }}
          onClick={clickGolden} aria-label="金のおむすび">
          🍙
        </button>
      )}

      <div className="toast-area">
        {toasts.map((t) => (
          <div key={t.id} className="toast">{t.msg}</div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<OnigiriClicker />);

</script>
</body>
</html>
